  <line x1="20" y1="64" x2="1220" y2="64" stroke="#21262d"/>

  <!-- the status line -->
  <text x="40" y="105" class="mono" font-size="13.5" xml:space="preserve"><tspan fill="#dcc800" font-weight="700">myrepo</tspan><tspan fill="#6e7681"> | </tspan><tspan fill="#00b4c8" font-weight="700">🌿 (main)</tspan><tspan fill="#6e7681"> | </tspan><tspan>🔥 </tspan><tspan fill="#3fb950">████</tspan><tspan fill="#86b73a">████</tspan><tspan fill="#cbb02b">████</tspan><tspan fill="#e3a341">████</tspan><tspan fill="#30363d">████</tspan><tspan fill="#e3b341"> 78%</tspan><tspan fill="#6e7681"> | </tspan><tspan fill="#6e7681">5h </tspan><tspan fill="#3fb950">███</tspan><tspan fill="#30363d">███████</tspan><tspan fill="#3fb950"> 34%</tspan><tspan fill="#6e7681"> (1h 0m) | </tspan><tspan fill="#6e7681">7d </tspan><tspan fill="#3fb950">███</tspan><tspan fill="#cbb02b">███</tspan><tspan fill="#30363d">████</tspan><tspan fill="#e3b341"> 61%</tspan><tspan fill="#6e7681"> (4d 0h) | </tspan><tspan fill="#00b4c8">⚡52 ln/m</tspan><tspan fill="#6e7681"> | </tspan><tspan fill="#3fb950">+142</tspan><tspan fill="#f85149"> -37</tspan><tspan fill="#6e7681"> | </tspan><tspan fill="#cb7bdb">🤖 Opus 4.8</tspan><tspan fill="#6e7681"> | </tspan><tspan fill="#dcc800">$1.23</tspan></text>
</svg>
