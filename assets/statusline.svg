  <!-- terminal card -->
  <rect width="1240" height="150" rx="14" fill="#0d1117"/>
  <rect x="20" y="20" width="1200" height="110" rx="10" fill="#161b22" stroke="#21262d"/>

  <!-- title bar -->
  <circle cx="46" cy="44" r="6" fill="#f85149"/>
  <circle cx="68" cy="44" r="6" fill="#e3b341"/>
  <circle cx="90" cy="44" r="6" fill="#3fb950"/>
