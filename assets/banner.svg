<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ai-toolkit: a curated toolkit for AI-assisted engineering">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="0.5" stop-color="#e3b341"/>
      <stop offset="1" stop-color="#f85149"/>
    </linearGradient>
    <linearGradient id="spectrumV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="0.5" stop-color="#e3b341"/>
      <stop offset="1" stop-color="#f85149"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#30363d"/>
    </pattern>
    <style>
      .mono { font-family: 'SFMono-Regular','JetBrains Mono','Fira Code',ui-monospace,Menlo,Consolas,monospace; }
    </style>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="320" rx="16" fill="#0d1117"/>
  <rect width="1280" height="320" rx="16" fill="url(#dots)" opacity="0.5"/>
  <rect width="1280" height="320" rx="16" fill="url(#glow)"/>
  <rect x="0.75" y="0.75" width="1278.5" height="318.5" rx="15" fill="none" stroke="#21262d" stroke-width="1.5"/>

  <!-- left spectrum accent -->
  <rect x="0" y="0" width="6" height="320" fill="url(#spectrumV)" opacity="0.9"/>

  <!-- wordmark -->
  <text x="84" y="150" class="mono" font-size="30" fill="#3fb950">❯</text>
  <text x="126" y="150" class="mono" font-size="78" font-weight="700" letter-spacing="-1" fill="#e6edf3">ai-toolkit</text>

  <!-- spectrum underline -->
  <rect x="128" y="176" width="470" height="5" rx="2.5" fill="url(#spectrum)"/>

  <!-- taglines -->
  <text x="128" y="220" class="mono" font-size="20" fill="#8b949e">A curated toolkit for AI-assisted engineering.</text>
  <text x="128" y="248" class="mono" font-size="15" fill="#6e7681">bash + python · symlinked into ~/.claude · no powershell</text>

  <!-- chips -->
  <g class="mono" font-size="16">
    <g transform="translate(128,272)"><rect width="118" height="34" rx="8" fill="#161b22" stroke="#30363d"/><text x="59" y="22" fill="#adbac7" text-anchor="middle">ai-deslop</text></g>
    <g transform="translate(258,272)"><rect width="132" height="34" rx="8" fill="#161b22" stroke="#30363d"/><text x="66" y="22" fill="#adbac7" text-anchor="middle">llm-council</text></g>
    <g transform="translate(402,272)"><rect width="120" height="34" rx="8" fill="#161b22" stroke="#30363d"/><text x="60" y="22" fill="#adbac7" text-anchor="middle">/bootstrap</text></g>
    <g transform="translate(534,272)"><rect width="78" height="34" rx="8" fill="#161b22" stroke="#30363d"/><text x="39" y="22" fill="#adbac7" text-anchor="middle">hooks</text></g>
    <g transform="translate(624,272)"><rect width="116" height="34" rx="8" fill="#161b22" stroke="#30363d"/><text x="58" y="22" fill="#adbac7" text-anchor="middle">statusline</text></g>
  </g>
</svg>
